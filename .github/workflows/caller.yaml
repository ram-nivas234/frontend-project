name: Release Pipeline

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
      - 'v[0-9]+.[0-9]+.[0-9]+-alpha'
      - 'v[0-9]+.[0-9]+.[0-9]+-alpha[0-9]+'
      - 'v[0-9]+.[0-9]+.[0-9]+-beta'
      - 'v[0-9]+.[0-9]+.[0-9]+-beta[0-9]+'
      - 'v[0-9]+.[0-9]+.[0-9]+-rc'
      - 'v[0-9]+.[0-9]+.[0-9]+-rc[0-9]+'
      - '[0-9]+.[0-9]+.[0-9]+'
      - '[0-9]+.[0-9]+.[0-9]+-alpha'
      - '[0-9]+.[0-9]+.[0-9]+-alpha[0-9]+'
      - '[0-9]+.[0-9]+.[0-9]+-beta'
      - '[0-9]+.[0-9]+.[0-9]+-beta[0-9]+'
      - '[0-9]+.[0-9]+.[0-9]+-rc'
      - '[0-9]+.[0-9]+.[0-9]+-rc[0-9]+'

  workflow_dispatch:
    inputs:
      test_tag:
        description: "Simulate this as the current tag (e.g. v1.0.1-beta1)"
        required: true
        default: "v1.0.1-beta1"

jobs:
  resolve-tags:
    runs-on: ubuntu-latest
    outputs:
      current_tag: ${{ steps.resolve.outputs.current_tag }}
      previous_tag: ${{ steps.resolve.outputs.previous_tag }}
      version_type: ${{ steps.resolve.outputs.version_type }}
      tag_format: ${{ steps.resolve.outputs.tag_format }}
      is_stable: ${{ steps.resolve.outputs.is_stable }}

    steps:
      - name: 📦 Checkout with full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🔍 Resolve Tags & Version Info
        id: resolve
        run: |
          CURRENT_TAG="${{ inputs.test_tag || github.ref_name }}"
          echo "🏷️  Current tag: $CURRENT_TAG"

          # ─────────────────────────────────────────
          # 1. Detect tag format (v-prefixed or plain)
          # ─────────────────────────────────────────
          if [[ "$CURRENT_TAG" == v* ]]; then
            TAG_FORMAT="vX.Y.Z"
            PREFIX="v"
          else
            TAG_FORMAT="X.Y.Z"
            PREFIX=""
          fi
          echo "📋 Tag format: $TAG_FORMAT"

          # ─────────────────────────────────────────
          # 2. Detect if current tag is stable or pre-release
          #    Stable  → vX.Y.Z or X.Y.Z (no suffix)
          #    Pre-rel → anything with -alpha, -beta, -rc (with or without number)
          # ─────────────────────────────────────────
          if [[ "$CURRENT_TAG" =~ ^${PREFIX}[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            IS_STABLE="true"
            echo "✅ Current tag is STABLE"
          else
            IS_STABLE="false"
            echo "🔖 Current tag is PRE-RELEASE"
          fi

          # ─────────────────────────────────────────
          # 3. Detect version type (major / minor / patch)
          # ─────────────────────────────────────────
          CLEAN_VERSION="${CURRENT_TAG#$PREFIX}"
          BASE_VERSION="${CLEAN_VERSION%%-*}"
          MAJOR=$(echo "$BASE_VERSION" | cut -d. -f1)
          MINOR=$(echo "$BASE_VERSION" | cut -d. -f2)
          PATCH=$(echo "$BASE_VERSION" | cut -d. -f3)

          PREV_STABLE=$(git tag --sort=-version:refname \
            | grep -E "^${PREFIX}[0-9]+\.[0-9]+\.[0-9]+$" \
            | grep -v "^${CURRENT_TAG}$" \
            | head -n 1)

          if [[ -z "$PREV_STABLE" ]]; then
            VERSION_TYPE="major"
          else
            PREV_CLEAN="${PREV_STABLE#$PREFIX}"
            PREV_MAJOR=$(echo "$PREV_CLEAN" | cut -d. -f1)
            PREV_MINOR=$(echo "$PREV_CLEAN" | cut -d. -f2)
            PREV_PATCH=$(echo "$PREV_CLEAN" | cut -d. -f3)

            if [[ "$MAJOR" -gt "$PREV_MAJOR" ]]; then
              VERSION_TYPE="major"
            elif [[ "$MINOR" -gt "$PREV_MINOR" ]]; then
              VERSION_TYPE="minor"
            else
              VERSION_TYPE="patch"
            fi
          fi
          echo "📦 Version type: $VERSION_TYPE"

          # ─────────────────────────────────────────
          # 4. Resolve previous_tag based on strategy
          #
          #    STABLE TAG     → previous stable tag only
          #                     (skips all alphas/betas/rcs in between)
          #
          #    PRE-RELEASE TAG → one tag immediately behind current
          #                     (could be stable or any pre-release)
          # ─────────────────────────────────────────
          if [[ "$IS_STABLE" == "true" ]]; then
            echo "🔎 Strategy: stable → looking for previous STABLE tag only..."

            PREVIOUS_TAG=$(git tag --sort=-version:refname \
              | grep -E "^${PREFIX}[0-9]+\.[0-9]+\.[0-9]+$" \
              | grep -v "^${CURRENT_TAG}$" \
              | head -n 1)

          else
            echo "🔎 Strategy: pre-release → looking for one tag behind (any type)..."

            # Build filtered list, find current tag index, pick i-1
            # NOTE: do NOT grep -v current tag here — we need it in the
            #       list to find its position, then look one step back
            FILTERED=()
            while IFS= read -r line; do
              FILTERED+=("$line")
            done < <(git tag --sort=version:refname \
              | grep -E "^${PREFIX}[0-9]+\.[0-9]+\.[0-9]+(-alpha[0-9]*|-beta[0-9]*|-rc[0-9]*)?$")

            PREVIOUS_TAG=""
            for i in "${!FILTERED[@]}"; do
              if [[ "${FILTERED[$i]}" == "$CURRENT_TAG" ]]; then
                if [[ $i -gt 0 ]]; then
                  PREVIOUS_TAG="${FILTERED[$((i-1))]}"
                fi
                break
              fi
            done
          fi

          # ─────────────────────────────────────────
          # 5. Fallback: if no previous tag found at all
          # ─────────────────────────────────────────
          if [[ -z "$PREVIOUS_TAG" ]]; then
            echo "⚠️  No previous tag found. Using git root commit as base."
            PREVIOUS_TAG=$(git rev-list --max-parents=0 HEAD)
          fi

          echo "✅ Resolved previous tag: $PREVIOUS_TAG"
          echo "================ SUMMARY ================"
          echo "  Current  : $CURRENT_TAG"
          echo "  Previous : $PREVIOUS_TAG"
          echo "  Stable   : $IS_STABLE"
          echo "  Type     : $VERSION_TYPE"
          echo "  Format   : $TAG_FORMAT"
          echo "========================================="

          # ─────────────────────────────────────────
          # 6. Set outputs
          # ─────────────────────────────────────────
          echo "current_tag=$CURRENT_TAG"    >> $GITHUB_OUTPUT
          echo "previous_tag=$PREVIOUS_TAG"  >> $GITHUB_OUTPUT
          echo "version_type=$VERSION_TYPE"  >> $GITHUB_OUTPUT
          echo "tag_format=$TAG_FORMAT"      >> $GITHUB_OUTPUT
          echo "is_stable=$IS_STABLE"        >> $GITHUB_OUTPUT

  # ─────────────────────────────────────────────────────────────────────────
  # Call the reusable CHANGELOG workflow — skipped during workflow_dispatch
  # ─────────────────────────────────────────────────────────────────────────
  changelog:
    needs: resolve-tags
    if: github.event_name == 'push'
    uses: ./.github/workflows/release-changelog.yaml
    with:
      branch: main
      tag_format: ${{ needs.resolve-tags.outputs.tag_format }}
      release_tag: ${{ needs.resolve-tags.outputs.current_tag }}
      version_type: ${{ needs.resolve-tags.outputs.version_type }}
      previous_tag: ${{ needs.resolve-tags.outputs.previous_tag }}
    secrets:
      GITHUB: ${{ secrets.GITHUB }}